<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>小六壬 AI · 中国大陆上线战略汇报</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0f0a1f;--deep:#1a1033;--gold:#d4af37;--gold2:#f5d77a;--mist:#b9a7e6;}
  html,body{margin:0;padding:0;background:#000;color:#fff;font-family:'Noto Sans SC',system-ui,sans-serif;overflow:hidden;}
  .serif{font-family:'Noto Serif SC',serif;}
  .deck{width:100vw;height:100vh;position:relative;}
  section.slide{position:absolute;inset:0;width:100%;height:100%;background:radial-gradient(ellipse at top,#241445 0%,#0f0a1f 55%,#06030f 100%);display:flex;flex-direction:column;padding:42px 64px 50px 64px;box-sizing:border-box;opacity:0;pointer-events:none;transform:translateX(40px);transition:opacity .55s ease, transform .55s ease;overflow:hidden;}
  section.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);}
  .hd{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(212,175,55,.25);padding-bottom:12px;}
  .hd .brand{display:flex;align-items:center;gap:12px;}
  .hd .logo{width:32px;height:32px;}
  .hd .pname{font-size:13px;letter-spacing:.18em;color:var(--gold2);}
  .hd .ptitle{font-size:12px;color:#cfc6e8;letter-spacing:.1em;}
  .ft{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#8b80a8;letter-spacing:.12em;border-top:1px solid rgba(212,175,55,.15);padding-top:10px;margin-top:auto;}
  .ft .conf{color:#d4af37aa;}
  .gold{color:var(--gold);} .gold2{color:var(--gold2);} .mist{color:var(--mist);}
  .chip{display:inline-block;padding:4px 12px;border:1px solid rgba(212,175,55,.5);border-radius:999px;color:var(--gold2);font-size:11px;letter-spacing:.18em;}
  .card{background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid rgba(212,175,55,.18);border-radius:14px;backdrop-filter:blur(6px);}
  .card-gold{background:linear-gradient(160deg,rgba(212,175,55,.12),rgba(212,175,55,.02));border:1px solid rgba(212,175,55,.45);}
  .h-title{font-family:'Noto Serif SC',serif;font-weight:900;letter-spacing:.04em;}
  .h-num{font-family:'Noto Serif SC',serif;font-weight:900;background:linear-gradient(180deg,#fff8d8 0%,#d4af37 60%,#8a6a18 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.6),transparent);}
  .pager{position:fixed;right:22px;bottom:18px;font-family:'Noto Serif SC',serif;color:#d4af37;font-size:13px;letter-spacing:.2em;z-index:50;background:rgba(15,10,31,.6);border:1px solid rgba(212,175,55,.35);padding:6px 14px;border-radius:999px;}
  .hint{position:fixed;left:22px;bottom:18px;font-size:11px;color:#8b80a8;z-index:50;letter-spacing:.1em;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .spin-slow{animation:spin 60s linear infinite;}
  .spin-rev{animation:spin 90s linear infinite reverse;}
  table.kt{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.kt th, table.kt td{padding:9px 10px;border-bottom:1px solid rgba(212,175,55,.15);text-align:left;}
  table.kt th{color:var(--gold2);font-weight:500;letter-spacing:.08em;font-size:11.5px;}
  table.kt td.win{color:#ffe79a;font-weight:500;}
  table.kt td.lose{color:#a99dba;}
  .kbd{display:inline-block;padding:2px 8px;border:1px solid rgba(212,175,55,.4);border-radius:6px;color:#d4af37;font-size:11px;}
  .pageHd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:14px;}
  .pageHd .ttl{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;color:#fff;}
  .pageHd .ttl .sub{display:block;font-family:'Noto Sans SC';font-size:11px;color:#9b8fc2;letter-spacing:.3em;margin-top:3px;font-weight:400;}
  .chap{font-family:'Noto Serif SC',serif;color:#d4af37;font-size:12px;letter-spacing:.4em;}
  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#0f0a1f;z-index:200;color:#d4af37;font-family:'Noto Serif SC',serif;}
  .loading.hide{opacity:0;pointer-events:none;transition:opacity .6s;}
  @media print{
    @page{size:A4 landscape;margin:0;}
    html,body{overflow:visible;background:#0f0a1f;}
    .deck{height:auto;width:auto;}
    section.slide{position:relative;opacity:1!important;transform:none!important;page-break-after:always;width:297mm;height:210mm;padding:24px 40px;}
    .pager,.hint,.loading{display:none;}
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <svg class="spin-slow" style="width:80px;height:80px"><use href="#taiji"/></svg>
  <div class="serif text-2xl mt-4 gold2">东方智慧 · AI 重塑</div>
  <div class="text-xs text-gray-400 mt-2 tracking-widest">LOADING SLIDES…</div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="taiji" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="none" stroke="#d4af37" stroke-width="1.2"/>
      <path d="M50 2 a48 48 0 0 1 0 96 a24 24 0 0 1 0 -48 a24 24 0 0 0 0 -48 z" fill="#d4af37" opacity=".85"/>
      <circle cx="50" cy="26" r="5" fill="#0f0a1f"/>
      <circle cx="50" cy="74" r="5" fill="#d4af37"/>
    </symbol>
    <symbol id="bagua" viewBox="0 0 120 120">
      <g fill="none" stroke="#d4af37" stroke-width="1">
        <circle cx="60" cy="60" r="58"/><circle cx="60" cy="60" r="42"/>
        <g stroke-width="2"><line x1="60" y1="4" x2="60" y2="22"/><line x1="60" y1="98" x2="60" y2="116"/><line x1="4" y1="60" x2="22" y2="60"/><line x1="98" y1="60" x2="116" y2="60"/><line x1="20" y1="20" x2="32" y2="32"/><line x1="88" y1="88" x2="100" y2="100"/><line x1="20" y1="100" x2="32" y2="88"/><line x1="88" y1="32" x2="100" y2="20"/></g>
      </g>
    </symbol>
    <symbol id="coin" viewBox="0 0 60 60"><circle cx="30" cy="30" r="28" fill="none" stroke="#d4af37" stroke-width="1.5"/><rect x="22" y="22" width="16" height="16" fill="none" stroke="#d4af37" stroke-width="1.5"/></symbol>
  </defs>
</svg>

<div class="deck" id="deck"></div>

<div class="pager"><span id="cur">1</span> / <span id="tot">22</span></div>
<div class="hint">← → 翻页 · 滚轮浏览 · <span class="kbd">Ctrl/⌘ + P</span> 导出 PDF（A4 横向）</div>

<script>
(async function(){
  const deck=document.getElementById('deck');
  const TOTAL=22;
  // 创建占位 sections
  for(let i=1;i<=TOTAL;i++){
    const s=document.createElement('section');
    s.className='slide'+(i===1?' active':'');
    s.dataset.id=i;
    deck.appendChild(s);
  }
  // 并发加载所有片段
  const tasks=[];
  for(let i=1;i<=TOTAL;i++){
    tasks.push(fetch('slides/s'+i+'.html',{cache:'no-cache'})
      .then(r=>r.ok?r.text():'<div class="p-10 text-red-300">片段 '+i+' 加载失败</div>')
      .then(html=>{document.querySelector('section.slide[data-id="'+i+'"]').innerHTML=html;}));
  }
  await Promise.all(tasks);
  document.getElementById('loading').classList.add('hide');
  setTimeout(()=>document.getElementById('loading').remove(),800);

  const slides=[...document.querySelectorAll('section.slide')];
  let idx=0;
  document.getElementById('tot').textContent=slides.length;
  function go(i){
    idx=Math.max(0,Math.min(slides.length-1,i));
    slides.forEach((s,n)=>s.classList.toggle('active',n===idx));
    document.getElementById('cur').textContent=idx+1;
    if(window.__chartHooks && window.__chartHooks[idx]) window.__chartHooks[idx]();
  }
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') go(idx+1);
    if(e.key==='ArrowLeft'||e.key==='PageUp') go(idx-1);
    if(e.key==='Home') go(0); if(e.key==='End') go(slides.length-1);
  });
  let wheelLock=false;
  window.addEventListener('wheel',e=>{
    if(wheelLock) return; wheelLock=true;setTimeout(()=>wheelLock=false,650);
    if(e.deltaY>10) go(idx+1); else if(e.deltaY<-10) go(idx-1);
  },{passive:true});
  window.__chartHooks={};

  // ========== Charts ==========
  Chart.defaults.color='#cfc6e8';
  Chart.defaults.font.family="'Noto Sans SC',sans-serif";
  Chart.defaults.borderColor='rgba(212,175,55,.18)';
  const GOLD='#d4af37', GOLD2='#f5d77a', MIST='#b9a7e6', PURPLE='#7e5bef', RED='#e07a8b', GREEN='#6ddfb8';

  function buildOnce(id,fn){
    const el=document.getElementById(id);
    if(!el || el.dataset.done) return;
    el.dataset.done=1;
    fn(el);
  }
  const builders={
    3: ()=>buildOnce('ch4',el=>new Chart(el,{type:'radar',data:{labels:['文化深度','情绪疗愈','娱乐属性','合规安全','响应速度','付费习惯匹配'],datasets:[
      {label:'玄机 AI（我们）',data:[95,92,88,96,98,90],backgroundColor:'rgba(212,175,55,.25)',borderColor:GOLD,borderWidth:2,pointBackgroundColor:GOLD},
      {label:'通用大模型',data:[55,60,40,70,90,30],backgroundColor:'rgba(126,91,239,.18)',borderColor:PURPLE,borderWidth:2,pointBackgroundColor:PURPLE},
      {label:'真人玄学师傅',data:[80,75,55,30,20,75],backgroundColor:'rgba(224,122,139,.15)',borderColor:RED,borderWidth:1.5,pointBackgroundColor:RED}
    ]},options:{plugins:{legend:{position:'bottom'}},scales:{r:{angleLines:{color:'rgba(212,175,55,.15)'},grid:{color:'rgba(212,175,55,.15)'},pointLabels:{color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}},ticks:{display:false,backdropColor:'transparent'},suggestedMin:0,suggestedMax:100}}}})),
    5: ()=>buildOnce('ch6',el=>new Chart(el,{type:'bar',data:{labels:['抑郁症患者','焦虑障碍人群','失眠人群','亚健康/情绪困扰','已接受心理咨询'],datasets:[{label:'人群规模（万人）',data:[9500,10800,30000,42000,800],backgroundColor:['#d4af37','#e8c25a','#b9a7e6','#7e5bef','#e07a8b'],borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false},title:{display:true,text:'中国心理 / 情绪健康人群规模 vs 已被服务人群（万人）',color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}}},scales:{x:{grid:{color:'rgba(212,175,55,.08)'},ticks:{callback:v=>v>=10000?(v/10000)+'亿':v+'万'}},y:{grid:{display:false}}}}})),
    6: ()=>buildOnce('ch7',el=>new Chart(el,{type:'bar',data:{labels:['2020','2021','2022','2023','2024','2025E','2026E'],datasets:[
      {label:'泛玄学市场 (亿)',data:[420,560,720,890,1200,1520,1880],backgroundColor:'rgba(212,175,55,.7)',borderRadius:6,stack:'a'},
      {label:'AI 玄学 / 情绪 (亿)',data:[2,8,22,55,140,320,620],backgroundColor:'rgba(109,223,184,.85)',borderRadius:6,stack:'a'}
    ]},options:{plugins:{legend:{position:'bottom'},title:{display:true,text:'中国泛玄学市场规模与 AI 玄学渗透（单位：亿元）',color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}}},scales:{x:{grid:{color:'rgba(212,175,55,.06)'}},y:{grid:{color:'rgba(212,175,55,.08)'},ticks:{callback:v=>v+'亿'}}}}})),
    7: ()=>buildOnce('ch8',el=>new Chart(el,{type:'line',data:{labels:['2020','2021','2022','2023','2024'],datasets:[
      {label:'B 站国学/玄学视频累计播放（亿）',data:[1.2,2.6,5.1,8.4,12.0],borderColor:GOLD,backgroundColor:'rgba(212,175,55,.15)',tension:.35,fill:true,pointRadius:4},
      {label:'小红书 #玄学 笔记（万）',data:[12,48,140,320,580],borderColor:RED,backgroundColor:'rgba(224,122,139,.1)',tension:.35,fill:true,pointRadius:4},
      {label:'知乎"小六壬"搜索指数',data:[18,30,52,82,150],borderColor:GREEN,backgroundColor:'rgba(109,223,184,.1)',tension:.35,fill:true,pointRadius:4}
    ]},options:{plugins:{legend:{position:'bottom'},title:{display:true,text:'年轻人国学 / 玄学内容消费曲线（5 年）',color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}}},scales:{x:{grid:{color:'rgba(212,175,55,.06)'}},y:{grid:{color:'rgba(212,175,55,.08)'}}}}})),
    13: ()=>buildOnce('ch14',el=>new Chart(el,{type:'bar',data:{labels:['玄机 AI（我们）','问问真人塔罗','测测付费版','抖音玄学打赏','线下命理馆'],datasets:[{label:'单次价格（元）',data:[3.5,150,28,260,800],backgroundColor:['#d4af37','#b9a7e6','#7e5bef','#e07a8b','#a96b6b'],borderRadius:6}]},options:{plugins:{legend:{display:false},title:{display:true,text:'单次价格对比（元）— 玄机 AI 拥有 4–230× 价格优势',color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}}},scales:{y:{type:'logarithmic',grid:{color:'rgba(212,175,55,.08)'},ticks:{callback:v=>'¥'+v}},x:{grid:{display:false}}}}})),
    14: ()=>buildOnce('ch15',el=>{
      const months=['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
      new Chart(el,{type:'line',data:{labels:months,datasets:[
        {label:'保守',data:[12,28,48,70,90,110,135,160,185,210,240,280],borderColor:MIST,backgroundColor:'rgba(185,167,230,.12)',tension:.35,fill:true,pointRadius:3},
        {label:'中性 ★',data:[18,52,110,180,260,340,430,540,660,790,940,1120],borderColor:GOLD,backgroundColor:'rgba(212,175,55,.15)',tension:.35,fill:true,pointRadius:4,borderWidth:3},
        {label:'乐观',data:[28,90,210,380,580,820,1100,1450,1870,2380,2980,3680],borderColor:GREEN,backgroundColor:'rgba(109,223,184,.12)',tension:.35,fill:true,pointRadius:3}
      ]},options:{plugins:{legend:{position:'bottom'},title:{display:true,text:'月度收入预测（万元）· 三档情景',color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}}},scales:{y:{grid:{color:'rgba(212,175,55,.08)'},ticks:{callback:v=>v+'万'}},x:{grid:{display:false}}}}});
    }),
    17: ()=>buildOnce('ch18',el=>new Chart(el,{type:'bar',data:{labels:['曝光(亿)','到达(千万)','点击(百万)','注册(百万)','首次占卜(百万)','付费(十万)','复购(十万)'],datasets:[{label:'冷启动 6 个月漏斗',data:[5.0,1.2,1.8,0.9,0.62,0.38,0.21],backgroundColor:['#d4af37','#e8c25a','#f5d77a','#b9a7e6','#7e5bef','#e07a8b','#6ddfb8'],borderRadius:6}]},options:{plugins:{legend:{display:false},title:{display:true,text:'冷启动 6 个月用户漏斗（数量级）',color:'#f5d77a',font:{size:13,family:"'Noto Serif SC',serif"}}},scales:{y:{grid:{color:'rgba(212,175,55,.08)'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}}))
  };
  Object.keys(builders).forEach(k=>{window.__chartHooks[k]=builders[k];});
  // 全部立即构建一次（确保打印 PDF 时所有图表都已渲染）
  setTimeout(()=>{Object.values(builders).forEach(fn=>{try{fn();}catch(e){}});},300);
})();
</script>

</body>
</html>
